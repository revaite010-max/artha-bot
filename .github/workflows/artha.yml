name: ARTHA Daily Screener

on:
  schedule:
    - cron: '30 1 * * 1-5'
  workflow_dispatch:

jobs:
  run-artha:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Create and Setup Virtual Environment
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install numpy==1.26.4 pandas==2.2.3 yfinance==0.2.40 requests==2.31.0 nsepython==2.95
          # Installing pandas_ta without checking dependencies to avoid conflicts
          pip install pandas-ta==0.3.14b0 --no-deps
          # Installing missing dependencies manually
          pip install scipy matplotlib
      
      - name: Run ARTHA
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          source venv/bin/activate
          python artha.py
